{% extends "base.html" %}

{% block title %}Consultation{% endblock %}

{% block content %}

<div class="consultation-section">
    <h1>Consultation Request</h1>

    <p>Please provide accurate information so your case can be reviewed properly.</p>

   <form method="POST" action="/consultation">

       <input type="text" name="name" placeholder="Your Name" required>
       <input type="email" name="email" placeholder="Your Email"required>

       <select name="urgency" required>
           <option value="">Select urgency</option>
           <option value="urgent">Urgent</option>
           <option value="not_urgent">Not Urgent</option>
       </select>

       <textarea name="message" placeholder="Describe your case..."required></textarea>

       <button type="submit">Submit Consultation</button>
           Submit Consultation
       </button>

   </form>
   </div>

{% endblock %}
