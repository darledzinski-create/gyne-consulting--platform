{% extends "base.html" %}

{% block title %}Home{% endblock %}

{% block content %}

<h1>Consultation Request</h1>

<p>Please provide accurate information so your case can be reviewed properly.</p>

<form method="POST" action="/consultation">

    <label>Full Name</label>
    <input type="text" name="name" required>

    <br><br>

    <label>Email Address</label>
    <input type="email" name="email" required>

    <br><br>

    <label>Describe your symptoms or concern</label>
    <textarea name="message" rows="5" required></textarea>

    <br><br>

    <button type="submit">Submit Consultation</button>

</form>
{% endblock %}
