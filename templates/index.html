{% extends "base.html" %}

{% block title %}Home{% endblock %}

{% block content %}

<h1>Consultation Request</h1>

<p>
Please provide accurate information so your casecan be reviewed properly.
</p>

<form method="POST" action="/consultation">

    <input type="text" name="name" placeholder="Your Name" required>

    <input type="email" name="email" placeholder="Your Email" required>

    <textarea name="message" placeholder="Describe your symptoms or concern" required></textarea>

    <button type="submit">Submit Consultation</button>

</form>

{% endblock %}
