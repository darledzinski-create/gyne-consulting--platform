{% extends "base.html" %}

{% block content %}

<div class="container">

    <h1>Book Appointment</h1>

    <form method="POST">

        <input type="hidden"
               name="csrf_token"
               value="{{ csrf_token() }}">

        <label>Patient Name</label>
        
        <input type="text"

               value="{{ consultation.name }}"

               readonly>

        <label>Email</label>

        <input type="email"

               value="{{ consultation.email }}"

               readonly>

        <label>Practice</label>

        <input type="text"

               name="practice"

               required>

        <label>Date</label>

        <input type="date"

               name="preferred_date"

               required>

        <label>Time</label>

        <input type="text"

               name="preferred_time"

               placeholder="10:30"

               required>
        
         <label>Reason</label>

        <textarea name="reason"></textarea>

        <button type="submit" id="submit-btn">
            Save Appointment
        </button>

        <script>
        document.querySelector("form").addEventListener("submit", function () {
            document.getElementById("submit-btn").disabled = true;
            document.getElementById("submit-btn").textContent = "Saving...";
        });
        </script>
        
    </form>

</div>

{% endblock %}
