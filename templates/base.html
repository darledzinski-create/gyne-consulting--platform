<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}Consultation{% endblock %}</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
        }

        .container {
            max-width: 600px;
        }

        header {
            margin-bottom: 10px;
        }

        nav {
            margin-bottom: 20px;
        }

        nav a {
            text-decoration: none;
            margin-right: 15px;
            font-weight: bold;
            color: #2c3e50;
        }

        nav a:hover {
            text-decoration: underline;
        }

        button {
            padding: 10px 15px;
            font-size: 16px;
            cursor: pointer;
        }

        label {
            font-weight: bold;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 10px;
            box-sizing: border-box;
        }

        button {
            background-color: #2c3e50;
            color: white;
            border: none;
            padding: 12px;
            cursor: pointer;
        }

        button:hover {
            background-color: #1a252f;
        }
        
    </style>

</head>
<body>

    <header>
        <h2>Dr Dariusz Consulting</h2>
    </header>

    <nav>
        <a href="/">Home</a> 
        <a href="/consultation">Consultation</a>
    </nav>

    <hr>

    <nav>
        <a href="/">Home</a> |
        <a href="/consultation">Consultation</a>
    </nav>

    <hr>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

</body>
</html>
