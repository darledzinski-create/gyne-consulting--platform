<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}Consultation{% endblock %}</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <style>

    body {
        font-family: Arial, sans-serif;
        margin: 0;
        background-color: #f7f9fc;
        color: #1f2937;
        line-height: 1.6;
    }

    /* TOP BAR */

    .top-bar {
        background: white;
        padding: 20px 40px;
        border-bottom: 1px solid #e5e7eb;
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
    }

    .logo {
        font-size: 24px;
        font-weight: bold;
        color: #1e293b;
    }

    /* NAVIGATION */

    nav {
        display: flex;
        gap: 25px;
    }

    nav a {
        text-decoration: none;
        font-weight: 600;
        color: #334155;
        transition: color 0.2s ease;
    }

    nav a:hover {
        color: #0f172a;
    }

    /* MAIN CONTAINER */

    .container {
        max-width: 1000px;
        margin: 120px auto;
        padding: 0 40px;
    }

    /* HEADINGS */

    h1 {
        font-size: 52px;
        margin-bottom: 20px;
        color: #0f172a;

    }

    h2 {
        color: #0f172a;
    }

    p {
        font-size: 20px;
        line-height: 1.8;
        max-width: 700;
        color: #475569;
        margin-bottom: 20px;
    }

    /* FORMS */

    input,
    textarea,
    select {
        width: 100%;
        padding: 14px;
        margin-top: 8px;
        margin-bottom: 20px;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        box-sizing: border-box;
        font-size: 16px;
        background: white;
    }

    textarea {
        min-height: 140px;
    }

    /* BUTTONS */

    button {
        background-color: #1e293b;
        color: white;
        border: none;
        padding: 16px 30px;
        border-radius: 10px;
        font-size: 17px;
        cursor: pointer;
        transition: all 0.2s ease;
        box-shadow: 0 6px 20px rgba(,0,0,0.08);
    }

    button:hover {
        background-color: #0f172a;
        transform: translateY(-2px);
    }

    button:active {
        transform: translateY(0);
    }

    /* MOBILE */

    @media (max-width: 768px) {

        .top-bar {
            padding: 20px;
            position: sticky;
            top: 0;
            z-index: 1000;
    }

    .container {
        margin: 50px auto;

    }

    h1 {
        font-size: 38px;

    }

    nav {
        margin-top: 15px;

    }

}

/* HERO SECTION */

.hero {
    display: flex;
    align-items: center;
    justify-content: center
    min-height: calc(100vh - 120px);
    text-align: center;
}

.hero-text {
    max-width: 760px;
    margin: 0 auto;
}

.hero h1 {
    font-size: 64px;
    line-height: 1.1;
    margin-bottom: 30px;
}

.hero p {
    font-size: 22px;
    margin-bottom: 24px;
    color: #475569;
}

.hero button {
    margin-top: 10px;
}

/* MOBILE */

@media (max-width: 768px) {

    .hero {
        min-height: auto;
    }

    .hero h1 {
        font-size: 42px;
    }

    .hero p {
        font-size: 18px;
    }
}

</style>
</head>

<body>

<header class="top-bar">
    <div class="logo">Dr Dariusz Consulting</div>

    <nav>
        <a href="/">Home</a>
        <a href="/consultation">Consultation</a>
    </nav>
</header>
    
    <div class="container">
        {% block content %}{% endblock %}
    </div>

</body>
</html>
