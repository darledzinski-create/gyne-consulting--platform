<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}Consultation{% endblock %}</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v=2">

</head>

<body>

<header class="top-bar">
    <div class="logo">Dr Dariusz Consulting</div>

    <nav>
        <a href="/">Home</a>
        <a href="/admin">Consultation Records</a>
        <a href="/logout">Logout</a>
        <a href="/appointments">Appointments</a>
    </nav>
</header>
    
    <div class="container">
        {% block content %}{% endblock %}
    </div>

<footer class="footer">

    <div class="footer-content">

        <h3>Dr Dariusz Consulting</h3>

        <p>

            Professional online gynaecological consultation platform.

        </p>

        <div class="footer-links">

            <a href="/">Home</a>

            <a href="/admin">Consultation Records</a>

            <a href="/logout">Logout</a>

        </div>

        <div class="footer-bottom">

            © 2026 Dr Dariusz Consulting. All rights reserved.

        </div>

    </div>

</footer>

<script>

document.addEventListener("DOMContentLoaded", function () {

    const form = document.querySelector(".consultation-form");

    const button = document.querySelector(".submit-btn");

    if (form && button) {

        form.addEventListener("submit", function () {

            button.disabled = true;

            button.innerHTML = "Submitting Consultation...";

            button.style.opacity = "0.75";

        });

    }

});

</script>

</body>
</html>
